services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - gateway
  gateway:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/semantic_cache
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - JWT_SECRET=28b0843a2e04908f498f1e820f453677cd8016a10f118ef4059514e1623469d0
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=100
      - RATE_LIMIT_REQUESTS=10000
      - RATE_LIMIT_WINDOW=60
      - CACHE_TTL_SECONDS=3600
      - SENTINEL_HOSTS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      - REDIS_MASTER_NAME=mymaster
    depends_on:
      - postgres
      - redis-primary
      - sentinel-1
      - sentinel-2
      - sentinel-3
      - rabbitmq
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: semantic_cache
    ports:
      - "5432:5432"
  worker:
    build: ./backend
    command: python -m workers.cache_worker
    working_dir: /app
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - redis-primary
      - rabbitmq

  
  redis-primary:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5


  redis-replica-1:
    image: redis/redis-stack:latest
    environment:
      - REDIS_ARGS=--replicaof redis-primary 6379
    depends_on:
      - redis-primary

  redis-replica-2:
    image: redis/redis-stack:latest
    environment:
      - REDIS_ARGS=--replicaof redis-primary 6379
    depends_on:
      - redis-primary

  sentinel-1:
    image: redis:7-alpine
    command: >
      sh -c "
        until getent hosts redis-primary > /dev/null 2>&1; do sleep 1; done &&
        REDIS_IP=$$(getent hosts redis-primary | awk '{ print $$1 }') &&
        echo 'port 26379' > /etc/sentinel.conf &&
        echo 'sentinel monitor mymaster '$$REDIS_IP' 6379 2' >> /etc/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 2000' >> /etc/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 5000' >> /etc/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /etc/sentinel.conf &&
        redis-sentinel /etc/sentinel.conf
      "
    volumes:
      - ./sentinel.conf:/tmp/sentinel.conf:ro
    depends_on:
      redis-primary:
        condition: service_healthy

  sentinel-2:
    image: redis:7-alpine
    command: >
      sh -c "
        until getent hosts redis-primary > /dev/null 2>&1; do sleep 1; done &&
        REDIS_IP=$$(getent hosts redis-primary | awk '{ print $$1 }') &&
        echo 'port 26379' > /etc/sentinel.conf &&
        echo 'sentinel monitor mymaster '$$REDIS_IP' 6379 2' >> /etc/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 2000' >> /etc/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 5000' >> /etc/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /etc/sentinel.conf &&
        redis-sentinel /etc/sentinel.conf
      "
    volumes:
      - ./sentinel.conf:/tmp/sentinel.conf:ro
    depends_on:
      redis-primary:
        condition: service_healthy

  sentinel-3:
    image: redis:7-alpine
    command: >
      sh -c "
        until getent hosts redis-primary > /dev/null 2>&1; do sleep 1; done &&
        REDIS_IP=$$(getent hosts redis-primary | awk '{ print $$1 }') &&
        echo 'port 26379' > /etc/sentinel.conf &&
        echo 'sentinel monitor mymaster '$$REDIS_IP' 6379 2' >> /etc/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 2000' >> /etc/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 5000' >> /etc/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /etc/sentinel.conf &&
        redis-sentinel /etc/sentinel.conf
      "
    volumes:
      - ./sentinel.conf:/tmp/sentinel.conf:ro
    depends_on:
      redis-primary:
        condition: service_healthy


  rabbitmq:
    image: rabbitmq:3-management
    ports:
    - "5672:5672"
    - "15672:15672"

  prometheus:
    image: prom/prometheus
    ports:
    - 9090:9090
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
    - gateway

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - jaeger
  
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14317:4317"

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus


    